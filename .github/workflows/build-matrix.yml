name: build-matrix

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.runner }} / ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-14
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: windows-2022
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.89
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cargo-${{ matrix.runner }}-${{ matrix.target }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install musl tools (Linux musl targets)
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools pkg-config

      - name: Build (release)
        run: cargo build --target ${{ matrix.target }} --release --bin youtube-transcript

      - name: Stage artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          if [[ "${{ matrix.runner }}" == windows* ]]; then
            cp "target/${{ matrix.target }}/release/youtube-transcript.exe" "dist/youtube-transcript-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/youtube-transcript" "dist/youtube-transcript-${{ matrix.target }}"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Download staged binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Add SKILL.md
        run: cp SKILL.md release-assets/SKILL.md

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
